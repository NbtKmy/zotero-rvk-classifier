<vbox id="rvk-classifier-prefs"
      onload="Zotero_RVKPrefs.init()"
      xmlns="http://www.mozilla.org/keymaster/gatekeeper/there.is.only.xul"
      xmlns:html="http://www.w3.org/1999/xhtml">
  <vbox class="main-section">
    <groupbox>
      <label><html:h2>LLM Settings</html:h2></label>

      <hbox align="center" style="margin-bottom:6px">
        <label value="Base URL" style="min-width:80px"/>
        <html:input id="rvk-base-url" type="text"
          placeholder="http://localhost:11434/v1"
          preference="extensions.zotero-rvk-classifier.ai.baseUrl"
          style="flex:1"/>
      </hbox>

      <hbox align="center" style="margin-bottom:6px">
        <label value="API Key" style="min-width:80px"/>
        <html:input id="rvk-api-key" type="password"
          placeholder="(optional)"
          preference="extensions.zotero-rvk-classifier.ai.apiKey"
          style="flex:1"/>
      </hbox>

      <hbox align="center" style="margin-bottom:6px">
        <label value="Model" style="min-width:80px"/>
        <html:input id="rvk-model" type="text"
          placeholder="llama3.2"
          preference="extensions.zotero-rvk-classifier.ai.model"
          style="flex:1"/>
        <button id="rvk-fetch-btn" label="Fetch models"
          oncommand="Zotero_RVKPrefs.fetchModels()"/>
      </hbox>

      <hbox style="padding-left:88px">
        <label id="rvk-model-status" value=""/>
      </hbox>
    </groupbox>
    <groupbox>
      <label><html:h2>Reranking Prompt</html:h2></label>

      <description style="margin-bottom:4px; color:GrayText; font-size:0.9em;">
        These lines are always sent to the model and cannot be changed:
      </description>
      <html:div style="background:#f4f4f4; border:1px solid #ccc; border-radius:4px; padding:8px 10px; font-size:0.85em; color:#666; margin-bottom:10px; font-family:monospace;">
        <html:div>Select and rank the 3 most appropriate RVK notations for the following book.</html:div>
        <html:div>Choose ONLY from the numbered candidates listed below.</html:div>
        <html:div>Return ONLY the 3 candidate numbers separated by " | " with no other text. Example: "2 | 5 | 1"</html:div>
        <html:div style="margin-top:6px;">RVK top-level classes (Hauptgruppen) — for context only, do NOT return these as answers:</html:div>
        <html:details style="margin-top:2px;">
          <html:summary style="cursor:pointer; color:#555;">Show Hauptgruppen</html:summary>
          <html:div style="margin-top:4px; white-space:pre; line-height:1.5;">A       Allgemeines
B       Theologie und Religionswissenschaften
CA–CK   Philosophie
CL–CZ   Psychologie
D       Pädagogik
E       Allg. und vergl. Sprach- und Literaturwissenschaft; Indogermanistik; Außereurop. Sprachen
F       Klassische Philologie; Byzantinistik; Mittellateinische und Neugriechische Philologie; Neulatein
G       Germanistik; Niederländische Philologie; Skandinavistik
H       Anglistik; Amerikanistik
I       Romanistik
K       Slawistik; Baltistik; Fennistik
LA–LC   Sozial- und Kulturanthropologie; Empirische Kulturwissenschaft
LD–LG   Klassische Archäologie
LH–LO   Kunstgeschichte
LP–LY   Musikwissenschaft
MA–ML   Politologie
MN–MS   Soziologie
MT      Gesundheitswissenschaften
MX–MZ   Militärwissenschaften
N       Geschichte
P       Rechtswissenschaft
Q       Wirtschaftswissenschaften
R       Geographie
SA–SP   Mathematik
SQ–SU   Informatik
TA–TD   Allgemeine Naturwissenschaften
TE–TZ   Geowissenschaften
U       Physik
V       Chemie und Pharmazie
W       Biologie
X–Y     Medizin
ZA–ZE   Land- und Forstwirtschaft; Gartenbau; Fischerei; Ernährungswissenschaft
ZG–ZS   Technik
ZX–ZY   Sportwissenschaft</html:div>
        </html:details>
      </html:div>

      <description style="margin-bottom:4px;">Additional instructions (optional):</description>
      <html:textarea id="rvk-extra-instructions"
        placeholder="e.g. Prefer notations from the LB (Volkskunde) range when the topic is relevant."
        style="width:100%; height:72px; font-family:monospace; font-size:0.9em; resize:vertical; box-sizing:border-box;"/>
    </groupbox>
  </vbox>
</vbox>
