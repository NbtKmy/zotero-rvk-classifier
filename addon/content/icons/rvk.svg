<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- Book outline -->
  <rect x="2" y="1" width="12" height="14" rx="1" fill="none" stroke="context-fill" stroke-width="1.5"/>
  <!-- Spine divider -->
  <line x1="5" y1="1" x2="5" y2="15" stroke="context-fill" stroke-width="1"/>
  <!-- Call-number label on spine (filled rectangle) -->
  <rect x="2.5" y="4.5" width="2" height="4" rx="0.4" fill="context-fill"/>
  <!-- Horizontal lines on page area (content) -->
  <line x1="7" y1="5" x2="12" y2="5" stroke="context-fill" stroke-width="1"/>
  <line x1="7" y1="8" x2="12" y2="8" stroke="context-fill" stroke-width="1"/>
  <line x1="7" y1="11" x2="10" y2="11" stroke="context-fill" stroke-width="1"/>
</svg>
